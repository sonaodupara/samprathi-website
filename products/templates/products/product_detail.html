{% extends "products/base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row">

        <div class="col-md-6">
            <img src="{{ product.image.url }}" class="img-fluid">
        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h4 class="text-muted">₹{{ product.price }}</h4>

            <p class="mt-3">
                {{ product.description }}
            </p>

            <a href="{% url 'add_to_cart' product.id %}" class="btn btn-dark">
                 Add to Cart
            </a>

        </div>

    </div>

</div>

{% endblock %}
